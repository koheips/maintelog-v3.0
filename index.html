<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json?v=v18c-dev-20260402">
  <title>メンテログ</title>
  <style>
    :root {
      --bg:#0b0b0b; --panel:#141414; --panel2:#1c1c1e;
      --panel3:#2c2c2e; --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.14); --text:#f2f2f7;
      --text2:#aeaeb2; --text3:#636366;
      --accent:#2f7cf6; --danger:#ff453a;
      --green:#30d158; --amber:#ffd60a;
      --radius:16px; --radius-sm:10px;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
      font-size:16px; line-height:1.5; }
    body { padding:max(0px,env(safe-area-inset-top)) 0 max(20px,env(safe-area-inset-bottom)); }
    .shell { max-width:640px; margin:0 auto; }

    /* ── トップバー ── */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px 8px; position:sticky; top:0; z-index:100;
      background:var(--bg);
      border-bottom:0.5px solid var(--line);
    }
    .app-title { font-size:17px; font-weight:600; color:var(--text); }

    /* ── セグメントコントロール（3タブ） ── */
    .seg-wrap { padding:10px 20px 0; }
    .seg {
      display:grid; grid-template-columns:1fr 1fr 1fr;
      background:var(--panel2); border-radius:10px; padding:3px; gap:2px;
    }
    .seg-btn {
      appearance:none; border:none; background:transparent;
      color:#8e8e93; font-size:14px; font-weight:500;
      padding:8px 4px; border-radius:8px; cursor:pointer;
      transition:background .15s, color .15s; text-align:center;
    }
    .seg-btn.active {
      background:var(--panel3); color:#ffffff;
      font-weight:600; font-size:14px;
      box-shadow:0 1px 4px rgba(0,0,0,.5);
    }

    /* ── セクション共通 ── */
    section { display:none; padding:0 0 32px; }
    section.active { display:block; }

    /* ── 推奨作業バナー（入力タブ最上部） ── */
    .reco-banner {
      margin:12px 20px 0;
      background:rgba(255,69,58,.08);
      border:0.5px solid rgba(255,69,58,.25);
      border-radius:var(--radius); padding:12px 14px;
    }
    .reco-banner-title {
      font-size:11px; font-weight:600; letter-spacing:.06em;
      color:rgba(255,120,110,.9); text-transform:uppercase; margin-bottom:8px;
    }
    .reco-row {
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:7px 0; border-bottom:0.5px solid rgba(255,69,58,.12); gap:8px;
    }
    .reco-row:last-child { border-bottom:none; }
    .reco-row-name { font-size:14px; color:var(--text); }
    .reco-row-right {
      display:flex; flex-wrap:wrap; justify-content:flex-end;
      align-items:center; gap:4px 8px; flex-shrink:0; max-width:60%;
    }
    .reco-date-sub { font-size:10px; color:#8e8e93; width:100%; text-align:right; margin-top:1px; }
    .reco-row-date { font-size:11px; color:var(--text3); white-space:nowrap; }
    .reco-badge {
      font-size:11px; padding:2px 9px; border-radius:999px; white-space:nowrap; font-weight:500;
    }
    .reco-badge-red { background:rgba(255,69,58,.18); color:#ff6b6b; }
    .reco-badge-amber { background:rgba(255,214,10,.15); color:#ffd60a; }

    /* ── カードブロック ── */
    .block { margin:12px 20px 0; }
    .block-label {
      font-size:12px; color:#e5e5ea; font-weight:600;
      letter-spacing:.06em; margin-bottom:6px; padding-left:4px; text-transform:uppercase;
    }
    .card {
      background:var(--panel); border-radius:var(--radius);
      overflow:hidden;
    }

    /* ── フラット入力フィールド ── */
    .field {
      display:flex; align-items:center; justify-content:space-between;
      padding:13px 16px; border-bottom:0.5px solid var(--line);
      gap:12px;
    }
    .field:last-child { border-bottom:none; }
    .field-label { font-size:15px; color:var(--text); white-space:nowrap; flex-shrink:0; }
    .field-input {
      background:transparent; border:none; color:var(--text);
      font-size:15px; text-align:right; flex:1; min-width:0; outline:none;
      font-family:inherit;
    }
    .field-input::placeholder { color:var(--text3); }
    .field-input[type="date"] { color-scheme:dark; }
    .field-select {
      background:transparent; border:none; color:var(--accent);
      font-size:15px; text-align:right; flex:1; min-width:0; outline:none;
      font-family:inherit; cursor:pointer; -webkit-appearance:none; appearance:none;
    }

    /* ── 作業チェックエリア ── */
    .task-group-label {
      font-size:12px; color:#e5e5ea; font-weight:600;
      padding:10px 16px 4px; letter-spacing:.05em; text-transform:uppercase;
    }
    .task-chips { display:flex; flex-wrap:wrap; gap:7px; padding:6px 16px 12px; }
    .task-chip {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:999px; font-size:14px; cursor:pointer;
      border:0.5px solid var(--line2); background:var(--panel2);
      color:var(--text2); transition:all .12s; user-select:none;
    }
    .task-chip.checked {
      background:var(--accent); border-color:var(--accent); color:#fff;
    }
    .task-chip input { display:none; }

    /* ── テキストエリア ── */
    .field-textarea {
      width:100%; background:transparent; border:none; color:var(--text);
      font-size:15px; padding:13px 16px; min-height:80px; resize:none;
      outline:none; font-family:inherit; line-height:1.5;
    }
    .field-textarea::placeholder { color:var(--text3); }

    /* ── 保存ボタン ── */
    .btn-primary {
      display:block; width:100%; padding:15px; border-radius:var(--radius);
      background:var(--accent); color:#fff; font-size:16px; font-weight:600;
      border:none; cursor:pointer; text-align:center; margin-top:12px;
      transition:opacity .12s;
    }
    .btn-primary:active { opacity:.8; }
    .btn-sub {
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 20px; border-radius:var(--radius-sm);
      background:var(--panel2); color:var(--text2); font-size:14px;
      border:0.5px solid var(--line2); cursor:pointer;
    }
    .btn-danger {
      background:rgba(255,69,58,.12); color:var(--danger);
      border-color:rgba(255,69,58,.25);
    }

    /* ── 履歴タイムライン ── */
    .hist-sort {
      display:flex; gap:6px; padding:12px 20px 0;
    }
    .hist-sort-btn {
      font-size:12px; padding:5px 12px; border-radius:999px;
      border:0.5px solid var(--line2); background:transparent;
      color:var(--text2); cursor:pointer;
    }
    .hist-sort-btn.active { background:var(--panel2); color:var(--text); }

    .hist-list { padding:0 20px; margin-top:8px; }
    .hist-entry {
      display:flex; gap:14px; padding:12px 0;
      border-bottom:0.5px solid var(--line);
    }
    .hist-entry:last-child { border-bottom:none; }
    .hist-left {
      display:flex; flex-direction:column; align-items:flex-end;
      min-width:52px; padding-top:2px; flex-shrink:0;
    }
    .hist-date { font-size:14px; font-weight:500; color:var(--text); }
    .hist-nights { font-size:12px; color:#aeaeb2; margin-top:2px; font-weight:500; }
    .hist-right { flex:1; min-width:0; }
    .hist-pills { display:flex; flex-wrap:wrap; gap:5px; }
    .hist-pill {
      font-size:12px; padding:3px 10px; border-radius:999px;
      white-space:nowrap;
    }
    .hist-actions {
      display:flex; gap:8px; margin-top:8px;
      max-height:0; overflow:hidden; transition:max-height .2s;
    }
    .hist-entry.expanded .hist-actions { max-height:60px; }
    .hist-action-btn {
      font-size:12px; padding:5px 12px; border-radius:999px;
      border:0.5px solid var(--line2); background:var(--panel2);
      color:var(--text2); cursor:pointer;
    }
    .hist-action-btn.edit { border-color:rgba(47,124,246,.4); color:var(--accent); }
    .hist-action-btn.del  { border-color:rgba(255,69,58,.3); color:var(--danger); }

    /* ── 作業内容マスター ── */
    .master-item {
      display:flex; align-items:center; gap:10px;
      padding:12px 16px; border-bottom:0.5px solid var(--line);
    }
    .master-item:last-child { border-bottom:none; }
    .master-item.dragging { opacity:.3; }
    .master-item.drag-over { border-top:2px solid var(--accent); }
    .drag-handle {
      font-size:18px; color:var(--text3); cursor:grab;
      user-select:none; touch-action:none; flex-shrink:0;
    }
    .drag-handle:active { cursor:grabbing; }
    .master-info { flex:1; min-width:0; }
    .master-name { font-size:15px; color:var(--text); }
    .master-meta { font-size:12px; color:#aeaeb2; margin-top:4px; }
    .master-color-preview {
      width:28px; height:28px; border-radius:50%; flex-shrink:0;
      border:2px solid rgba(255,255,255,.2);
    }
    .master-btn {
      font-size:12px; padding:5px 11px; border-radius:999px;
      border:0.5px solid var(--line2); background:var(--panel2);
      color:var(--text2); cursor:pointer; white-space:nowrap; flex-shrink:0;
    }
    .master-btn.danger { color:var(--danger); border-color:rgba(255,69,58,.3); }

    /* カラーピッカー */
    /* カラーグリッド */
    input[type="color"] { display:none; }
    .color-grid { display:flex; flex-wrap:wrap; gap:5px; }
    .color-swatch {
      width:26px; height:26px; border-radius:6px; cursor:pointer;
      border:2px solid transparent; transition:transform .1s, border-color .1s;
      flex-shrink:0;
    }
    .color-swatch:hover { transform:scale(1.15); }
    .color-swatch.selected { border-color:#ffffff; transform:scale(1.1); }
    .color-swatch-custom {
      width:26px; height:26px; border-radius:6px; cursor:pointer;
      border:1.5px dashed rgba(255,255,255,.35); display:flex;
      align-items:center; justify-content:center; font-size:14px;
      color:rgba(255,255,255,.5); flex-shrink:0; transition:transform .1s;
    }
    .color-swatch-custom:hover { transform:scale(1.1); }
    .color-preview-pill {
      display:inline-flex; align-items:center;
      padding:3px 12px; border-radius:999px; font-size:12px; font-weight:500;
      border:1px solid rgba(255,255,255,.15); white-space:nowrap;
    }

    /* ── 設定タブ ── */
    .setting-group { margin:12px 20px 0; }
    .setting-group-label {
      font-size:12px; color:#e5e5ea; font-weight:600;
      letter-spacing:.06em; margin-bottom:6px; padding-left:4px; text-transform:uppercase;
    }
    .setting-note { font-size:12px; color:var(--text3); padding:8px 4px 0; line-height:1.6; }

    /* 折りたたみ */
    .collapse-btn {
      width:100%; display:flex; justify-content:space-between; align-items:center;
      padding:13px 16px; background:transparent; border:none; color:var(--text2);
      font-size:15px; cursor:pointer; border-bottom:0.5px solid var(--line);
    }
    .collapse-btn:last-child { border-bottom:none; }
    .collapse-btn .chevron { font-size:12px; transition:transform .2s; }
    .collapse-btn.open .chevron { transform:rotate(180deg); }
    .collapse-body { display:none; }
    .collapse-body.open { display:block; }

    /* ── モーダル ── */
    .modalOverlay {
      position:fixed; inset:0; background:rgba(0,0,0,.7);
      display:flex; align-items:flex-end; justify-content:center;
      padding:0; z-index:9999;
    }
    .modalOverlay.hidden { display:none; }
    .modalCard {
      width:100%; max-width:640px; background:var(--panel);
      border-radius:20px 20px 0 0; padding:20px 20px max(20px,env(safe-area-inset-bottom));
      max-height:88vh; overflow-y:auto;
    }
    .modal-handle {
      width:36px; height:4px; background:var(--line2); border-radius:2px;
      margin:0 auto 16px;
    }
    .modalHead { font-size:17px; font-weight:600; margin-bottom:16px; }
    .modal-field { margin-bottom:14px; }
    .modal-field label {
      display:block; font-size:12px; color:var(--text3); margin-bottom:6px;
    }
    .modal-field input, .modal-field select, .modal-field textarea {
      width:100%; background:var(--panel2); color:var(--text);
      border:0.5px solid var(--line2); border-radius:var(--radius-sm);
      padding:11px 14px; font-size:15px; font-family:inherit; outline:none;
    }
    .modal-field select { -webkit-appearance:none; cursor:pointer; }
    .modal-field textarea { min-height:80px; resize:none; }
    .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .modalActions { display:flex; gap:10px; margin-top:16px; }
    .modal-btn {
      flex:1; padding:13px; border-radius:var(--radius-sm); font-size:15px;
      font-weight:500; border:none; cursor:pointer;
    }
    .modal-btn-cancel { background:var(--panel2); color:var(--text2); }
    .modal-btn-ok     { background:var(--accent); color:#fff; }


    /* ── 保存トースト ── */
    .save-toast {
      display:flex; align-items:center; gap:8px;
      background:rgba(48,209,88,0.14);
      border:0.5px solid rgba(48,209,88,0.40);
      border-radius:10px; padding:10px 14px;
      font-size:13px; color:#30d158;
      margin-top:8px;
      animation:toastIn .2s ease;
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    /* ── フッタ ── */
    .footer {
      text-align:center; padding:24px 20px 8px;
      font-size:11px; color:var(--text3); line-height:1.8;
      border-top:0.5px solid var(--line); margin-top:20px;
    }

    /* ── ユーティリティ ── */
    .row { display:flex; gap:8px; flex-wrap:wrap; }
    .muted { color:var(--text3); font-size:13px; }
    .tag {
      display:inline-flex; align-items:center;
      border:0.5px solid var(--line2); border-radius:999px;
      padding:5px 12px; font-size:13px; color:var(--text2); white-space:nowrap;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- トップバー -->
  <div class="topbar">
    <div id="appTitle" class="app-title">メンテログ</div>
  </div>

  <!-- セグメントコントロール -->
  <div class="seg-wrap">
    <div class="seg">
      <button id="tabInput"   type="button" class="seg-btn active">入力</button>
      <button id="tabHistory" type="button" class="seg-btn">履歴</button>
      <button id="tabSetting" type="button" class="seg-btn">設定</button>
    </div>
  </div>

  <!-- ══ 入力タブ ══ -->
  <section id="viewInput" class="active">

    <!-- 推奨作業バナー（要対応のみ・なければ非表示） -->
    <div id="recoBanner" style="display:none">
      <div class="reco-banner">
        <div class="reco-banner-title">要対応</div>
        <div id="recoList"></div>
      </div>
    </div>

    <!-- 記録入力 -->
    <div class="block">
      <div class="block-label">記録入力</div>
      <div class="card">
        <div class="field">
          <span class="field-label">日付</span>
          <input id="date" type="date" class="field-input">
        </div>
        <div class="field">
          <span class="field-label">滞在日数</span>
          <input id="nights" type="number" inputmode="numeric" min="0" placeholder="0" class="field-input">
        </div>
      </div>
    </div>

    <!-- 作業内容 -->
    <div class="block">
      <div class="block-label">作業内容</div>
      <div class="card">
        <div id="tasksArea"></div>
      </div>
    </div>

    <!-- メモ -->
    <div class="block">
      <div class="block-label">メモ</div>
      <div class="card">
        <textarea id="other" class="field-textarea" placeholder="自由入力"></textarea>
      </div>
    </div>

    <div class="block">
      <button id="save"  type="button" class="btn-primary">保存</button>
      <button id="clear" type="button" class="btn-sub" style="margin-top:8px;width:100%;justify-content:center;">クリア</button>
    </div>

    <div class="footer">
      <div>©Kohei Sekine (2026)</div>
      <div>本アプリの無断転載・複製・改変等を禁じます</div>
    </div>
  </section>

  <!-- ══ 履歴タブ ══ -->
  <section id="viewHistory">
    <div class="hist-sort">
      <button id="sortDesc" type="button" class="hist-sort-btn active">新しい順</button>
      <button id="sortAsc"  type="button" class="hist-sort-btn">古い順</button>
    </div>
    <div id="historyBody" class="hist-list"></div>
  </section>

  <!-- ══ 設定タブ ══ -->
  <section id="viewSetting">

    <!-- 作業追加 -->
    <div class="setting-group">
      <div class="setting-group-label">作業追加</div>
      <div class="card">
        <div class="field">
          <span class="field-label">作業名</span>
          <input id="newTask" type="text" placeholder="作業名" class="field-input" style="text-align:right;">
        </div>
        <div class="field">
          <span class="field-label">区分</span>
          <select id="newCat" class="field-select"></select>
        </div>
        <div class="field">
          <span class="field-label">トリガー種別</span>
          <select id="newTrigger" class="field-select">
            <option value="days">経過日数</option>
            <option value="nights">累計滞在日数</option>
          </select>
        </div>
        <div class="field">
          <span class="field-label">閾値（日）</span>
          <input id="newFreq" type="number" inputmode="numeric" min="1" placeholder="未設定" class="field-input" style="text-align:right;">
        </div>
        <div style="padding:10px 16px 14px;border-top:0.5px solid var(--line);">
          <div style="font-size:11px;color:#8e8e93;margin-bottom:6px;">背景色</div>
          <div id="newBgGridArea" class="color-grid"></div>
          <div style="font-size:11px;color:#8e8e93;margin:10px 0 6px;">文字色</div>
          <div id="newTextGridArea" class="color-grid"></div>
        </div>
      </div>
      <button id="addTask" type="button" class="btn-primary" style="margin-top:8px;">追加</button>
    </div>

    <!-- 作業内容マスター -->
    <div class="setting-group" style="margin-top:20px;">
      <div class="card">
        <button type="button" class="collapse-btn" id="masterToggle">
          <span>作業内容マスター</span><span class="chevron">▾</span>
        </button>
        <div class="collapse-body" id="masterBody">
          <div class="muted" style="padding:6px 16px 4px;font-size:11px;">⠿ をドラッグまたはタッチで並び替え</div>
          <div id="master"></div>
        </div>
      </div>
    </div>

    <!-- 区分マスター -->
    <div class="setting-group">
      <div class="card">
        <button type="button" class="collapse-btn" id="catToggle">
          <span>区分マスター</span><span class="chevron">▾</span>
        </button>
        <div class="collapse-body" id="catBody">
          <div style="padding:10px 16px;border-bottom:0.5px solid var(--line);display:flex;gap:8px;">
            <input id="catName_v5" type="text" placeholder="区分名を追加"
              style="flex:1;background:var(--panel2);border:0.5px solid var(--line2);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;color:var(--text);outline:none;font-family:inherit;">
            <button id="catAddBtn" type="button" class="btn-sub">追加</button>
          </div>
          <div id="catList_v5"></div>
        </div>
      </div>
    </div>

    <!-- メモ表示色 -->
    <div class="setting-group">
      <div class="card">
        <button type="button" class="collapse-btn" id="memoColorToggle">
          <span>メモ表示色</span><span class="chevron">▾</span>
        </button>
        <div class="collapse-body" id="memoColorBody">
          <div style="padding:12px 16px 14px;">
            <div style="font-size:12px;color:#8e8e93;margin-bottom:10px;">履歴画面のメモテキストの表示色</div>
            <div id="memoColorGrid" class="color-grid"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- データ -->
    <div class="setting-group" style="margin-top:20px;">
      <div class="setting-group-label">データ</div>
      <div class="card">
        <div class="field">
          <span class="field-label" id="status">記録 0件</span>
        </div>
        <div class="field" style="border-bottom:none;gap:8px;flex-wrap:wrap;">
          <button id="export" type="button" class="btn-sub">JSON書き出し</button>
          <label class="btn-sub" style="cursor:pointer;">
            <span>JSON読み込み</span>
            <input id="import" type="file" accept="application/json" style="display:none;">
          </label>
          <button id="wipe" type="button" class="btn-sub btn-danger">全データ削除</button>
        </div>
