<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json?v=v16b-2026-03-30">
  <title>メンテログ</title>
  <style>
    :root {
      --bg:#0b0b0b; --panel:#141414; --panel2:#1b1b1b;
      --line:rgba(255,255,255,.10); --text:#f4f4f4; --muted:#b9b9b9;
      --accent:#2f7cf6; --danger:#b63b3b; --radius:18px;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif; }
    body { padding:max(12px,env(safe-area-inset-top)) 12px 16px; }
    .shell { max-width:900px; margin:0 auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .title  { font-size:22px; font-weight:700; }
    .row    { display:flex; gap:10px; flex-wrap:wrap; }
    .card   { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px; margin-bottom:12px; }
    .tabs   { display:flex; gap:8px; margin-bottom:12px; }
    .grid2  { display:grid; grid-template-columns:1fr 140px; gap:10px; }
    .muted  { color:var(--muted); font-size:13px; }
    .groupTitle  { margin:10px 0 8px; font-size:13px; color:var(--muted); }
    .sectionTitle{ font-size:14px; color:var(--muted); margin-bottom:8px; }

    button,input,select,textarea { font:inherit; }
    button { appearance:none; border:1px solid var(--line); color:var(--text);
      background:var(--panel2); border-radius:14px; padding:10px 12px; cursor:pointer; }
    button.active { background:var(--accent); border-color:transparent; }
    button.small  { padding:7px 10px; border-radius:10px; }
    button.danger { background:rgba(182,59,59,.18); border-color:rgba(182,59,59,.35); }
    input[type="text"],input[type="number"],input[type="date"],select,textarea {
      width:100%; background:var(--panel2); color:var(--text);
      border:1px solid var(--line); border-radius:14px; padding:10px 12px; }
    textarea { min-height:96px; resize:vertical; }

    /* ── カラーピッカー白枠（黒背景でも確実に視認できるよう多重ボーダー） ── */
    input[type="color"] {
      width:34px !important; height:34px !important;
      padding:2px !important;
      border-radius:50% !important;
      border:2.5px solid rgba(255,255,255,0.6) !important;
      outline:1.5px solid rgba(0,0,0,1) !important;
      outline-offset:0px !important;
      box-shadow:0 0 0 1.5px rgba(0,0,0,0.95) !important;
      cursor:pointer; background:transparent; -webkit-appearance:none;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding:0; border-radius:50%; }
    input[type="color"]::-webkit-color-swatch { border:none; border-radius:50%; }

    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip  { display:inline-flex; align-items:center; gap:8px;
      border:1px solid var(--line); border-radius:999px; padding:7px 10px; white-space:nowrap; cursor:pointer; }
    .chip input { width:auto; }

    .pill { display:inline-flex; align-items:center; white-space:nowrap;
      word-break:keep-all; padding:5px 10px; border-radius:999px; line-height:1.1; }
    .tag  { display:inline-flex; align-items:center; border:1px solid var(--line);
      border-radius:999px; padding:5px 9px; font-size:12px; white-space:nowrap; }

    /* ── 作業内容マスター ── */
    .masterItem {
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      padding:12px 4px; border-bottom:1px solid rgba(255,255,255,.06);
    }
    .masterItem:last-child { border-bottom:none; }
    .masterItem.dragging  { opacity:0.35; }
    .masterItem.drag-over { border-top:2.5px solid var(--accent); }
    .masterName   { font-weight:600; }
    .drag-handle  {
      font-size:20px; opacity:0.45; cursor:grab;
      user-select:none; touch-action:none; padding:0 4px; line-height:1;
    }
    .drag-handle:active { cursor:grabbing; opacity:0.85; }
    .colorPick    { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .color-label  { font-size:11px; opacity:0.6; }
    .colorPreview {
      display:inline-flex; align-items:center;
      padding:4px 10px; border-radius:999px; font-size:12px;
      border:1px solid rgba(255,255,255,0.18); white-space:nowrap;
    }

    /* ── 推奨作業 ── */
    .recoItem { display:flex; align-items:flex-start; justify-content:space-between;
      gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    .recoItem:last-child { border-bottom:none; }
    .recoName { font-size:15px; font-weight:600; padding:4px 12px; border-radius:999px;
      background:rgba(255,255,255,0.06); white-space:nowrap; }
    .recoMeta { font-size:13px; opacity:0.75; line-height:1.7; text-align:right; }
    .due-label { color:#ff88aa; font-weight:600; }

    /* ── 折りたたみパネル ── */
    .miniPanel  { border:1px solid rgba(255,255,255,0.12); border-radius:18px;
      padding:12px; margin:10px 0; background:rgba(255,255,255,0.03); }
    .catPanel   { border:none; background:transparent; padding:0; }
    .miniToggle { width:100%; text-align:left; margin:10px 0; }
    .miniRow    { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .miniRow input[type=text] { flex:1 1 180px; }

    /* ── 履歴 ── */
    #historyBody { margin-top:10px; }
    .histList    { display:flex; flex-direction:column; gap:14px; }
    .histEntry   { border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.03); border-radius:18px; padding:12px; }
    .histHeader  { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .histHeadLeft{ display:flex; align-items:baseline; gap:10px; }
    .histDate    { font-size:16px; font-weight:700; white-space:nowrap; }
    .histDays    { opacity:0.8; font-size:14px; white-space:nowrap; }
    .histBtnWrap { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    /* ── 履歴 編集ボタン（青みがかった背景で削除と明確に区別） ── */
    .histEditBtn {
      padding:7px 14px; border-radius:12px;
      border:1px solid rgba(47,124,246,0.50) !important;
      background:rgba(47,124,246,0.18) !important;
      color:var(--text) !important; font-size:13px; cursor:pointer; white-space:nowrap;
    }
    .histEditBtn:hover { background:rgba(47,124,246,0.35) !important; }
    .histDelBtn  { padding:7px 14px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.03);
      color:var(--text); font-size:13px; cursor:pointer; white-space:nowrap; }
    .histScroll  { overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:10px; padding-bottom:2px; }
    .histScroll::-webkit-scrollbar { height:6px; }
    .histInner   { min-width:max-content; }
    .histCatRow  { display:flex; gap:10px; align-items:flex-start; margin-top:10px; }
    .histCatLabel{ min-width:52px; font-size:12px; opacity:0.72; padding-top:2px; white-space:nowrap; }
    .histCatPills{ display:flex; flex-wrap:nowrap; gap:8px; }
    .histCatPills .pill { padding:7px 10px; font-size:15px; flex:0 0 auto; }

    /* ── モーダル ── */
    .modalOverlay { position:fixed; inset:0; background:rgba(0,0,0,.65);
      display:flex; align-items:center; justify-content:center; padding:16px; z-index:9999; }
    .modalOverlay.hidden { display:none; }
    .modalCard    { width:min(92vw,520px); background:var(--panel);
      border:1px solid var(--line); border-radius:18px; padding:16px;
      max-height:88vh; overflow-y:auto; }
    .modalHead    { font-size:18px; font-weight:700; margin-bottom:12px; }
    .modalActions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }

    /* ── フッタ ── */
    .appFooter {
      margin-top:20px;
      padding:14px 0 max(14px,env(safe-area-inset-bottom));
      text-align:center;
      font-size:11px;
      color:rgba(255,255,255,0.28);
      line-height:1.8;
      border-top:1px solid rgba(255,255,255,0.07);
    }

    @media (max-width:640px) { .grid2 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div id="appTitle" class="title">メンテログ</div>
  </div>

  <div class="tabs">
    <button id="tabInput"   type="button" class="active">入力</button>
    <button id="tabHistory" type="button">履歴</button>
  </div>

  <!-- 入力 -->
  <section id="viewInput">

    <div class="card">
      <div class="sectionTitle">記録入力</div>
      <div class="grid2">
        <div><label class="muted" for="date">日付</label><input id="date" type="date"></div>
        <div><label class="muted" for="nights">泊数</label>
          <input id="nights" type="number" inputmode="numeric" min="0" placeholder="0"></div>
      </div>
      <div style="margin-top:12px">
        <div class="sectionTitle">作業内容</div>
        <div id="tasksArea"></div>
      </div>
      <div style="margin-top:12px">
        <label class="muted" for="other">その他メモ</label>
        <textarea id="other" placeholder="自由入力"></textarea>
      </div>
      <div class="row" style="margin-top:12px">
        <button id="save"  type="button">保存</button>
        <button id="clear" type="button">クリア</button>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">作業追加</div>
      <div class="grid2">
        <div><label class="muted" for="newTask">作業名</label>
          <input id="newTask" type="text" placeholder="作業名"></div>
        <div><label class="muted" for="newCat">区分</label><select id="newCat"></select></div>
      </div>
      <div class="grid2" style="margin-top:10px">
        <div><label class="muted" for="newFreq">推奨頻度 日数</label>
          <input id="newFreq" type="number" inputmode="numeric" min="1" placeholder="未設定"></div>
        <div class="row" style="align-items:end">
          <div style="flex:1"><label class="muted" for="newBg">背景色</label>
            <input id="newBg" type="color" value="#0f0f0f"></div>
          <div style="flex:1"><label class="muted" for="newText">文字色</label>
            <input id="newText" type="color" value="#f0f0f0"></div>
        </div>
      </div>
      <div class="row" style="margin-top:12px">
        <button id="addTask" type="button">追加</button>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">作業内容マスター</div>
      <p class="muted" style="margin:0 0 8px;font-size:11px">⠿ をドラッグ（PC）またはタッチで順序変更</p>
      <div id="master"></div>
    </div>

    <div class="card">
      <div class="sectionTitle">推奨作業</div>
      <div id="reco"></div>
    </div>

    <div class="card">
      <div class="sectionTitle">データ</div>
      <div class="row">
        <button id="export" type="button">JSON書き出し</button>
        <label class="tag" style="cursor:pointer"><span>JSON読み込み</span>
          <input id="import" type="file" accept="application/json" style="display:none"></label>
        <button id="wipe" type="button" class="danger">全データ削除</button>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">アプリ名</div>
      <div class="row">
        <input id="appName" type="text" placeholder="アプリ名">
        <button id="saveAppName"  type="button">保存</button>
        <button id="resetAppName" type="button">初期化</button>
      </div>
      <div id="status" class="muted" style="margin-top:10px"></div>
    </div>

    <div class="appFooter">
      <div>©Kohei Sekine (2026)</div>
      <div>本アプリの無断転載・複製・改変等を禁じます</div>
    </div>

  </section>

  <!-- 履歴 -->
  <section id="viewHistory" style="display:none">
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <div class="sectionTitle" style="margin:0">履歴</div>
        <div class="row">
          <button id="sortDesc" type="button" class="small active">新しい順</button>
          <button id="sortAsc"  type="button" class="small">古い順</button>
        </div>
      </div>
      <div id="historyBody"></div>
    </div>
  </section>

</div><!-- /.shell -->

<div id="modalOverlay" class="modalOverlay hidden">
  <div class="modalCard">
    <div id="modalTitle" class="modalHead"></div>
    <div id="modalBody"></div>
    <div class="modalActions">
      <button id="modalCancel" type="button">キャンセル</button>
      <button id="modalOk"     type="button">OK</button>
    </div>
  </div>
</div>

<script src="app.js?v=v16b-2026-03-30"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js?v=v16b-2026-03-30").catch(() => {});
    });
  }
</script>
</body>
</html>
