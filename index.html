<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json?v=2026-02-26-v10">
  <title>メンテログ</title>
  <style>
    :root {
      --bg:#0b0b0b;
      --panel:#141414;
      --panel2:#1b1b1b;
      --line:rgba(255,255,255,.10);
      --text:#f4f4f4;
      --muted:#b9b9b9;
      --accent:#2f7cf6;
      --danger:#b63b3b;
      --radius:18px;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif; }
    body { padding: max(12px, env(safe-area-inset-top)) 12px 16px; }
    .shell { max-width: 900px; margin: 0 auto; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px;
    }
    .title { font-size:22px; font-weight:700; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .card {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:12px;
      margin-bottom:12px;
    }
    .tabs {
      display:flex; gap:8px; margin-bottom:12px;
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      appearance:none; border:1px solid var(--line); color:var(--text); background:var(--panel2);
      border-radius:14px; padding:10px 12px; cursor:pointer;
    }
    button.active { background: var(--accent); border-color: transparent; }
    button.small { padding:7px 10px; border-radius:10px; }
    button.danger { background: rgba(182,59,59,.18); border-color: rgba(182,59,59,.35); }
    input[type="text"], input[type="number"], input[type="date"], select, textarea {
      width:100%; background:var(--panel2); color:var(--text); border:1px solid var(--line);
      border-radius:14px; padding:10px 12px;
    }
    textarea { min-height:96px; resize:vertical; }
    .muted { color: var(--muted); font-size: 13px; }
    .grid2 { display:grid; grid-template-columns: 1fr 140px; gap:10px; }
    .groupTitle { margin:10px 0 8px; font-size:13px; color:var(--muted); }
    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip {
      display:inline-flex; align-items:center; gap:8px;
      border:1px solid var(--line); border-radius:999px; padding:7px 10px;
      white-space:nowrap;
    }
    .chip input { width:auto; }
    .masterItem {
      display:grid; grid-template-columns: minmax(120px,1fr) auto auto; gap:8px; align-items:center;
      padding:10px 0; border-bottom:1px solid rgba(255,255,255,.06);
    }
    .masterItem:last-child { border-bottom:none; }
    .masterName { font-weight:600; }
    .tag {
      display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:999px;
      padding:5px 9px; font-size:12px; white-space:nowrap;
    }
    .colorPick { display:flex; gap:6px; align-items:center; }
    .colorPick input[type="color"] { width:32px; height:32px; padding:0; border:none; background:transparent; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; vertical-align:top; padding:10px 6px; border-bottom:1px solid rgba(255,255,255,.06); }
    thead th { font-size:12px; color:var(--muted); font-weight:600; }
    .right { text-align:right; }
    .modalOverlay {
      position:fixed; inset:0; background:rgba(0,0,0,.62); display:flex; align-items:center; justify-content:center;
      padding:16px; z-index:9999;
    }
    .modalOverlay.hidden { display:none; }
    .modalCard {
      width:min(92vw, 480px); background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:14px;
    }
    .modalHead { font-size:18px; font-weight:700; margin-bottom:10px; }
    .modalActions { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
    .sectionTitle { font-size:14px; color:var(--muted); margin-bottom:8px; }
    @media (max-width:640px) {
      .grid2 { grid-template-columns:1fr; }
      .masterItem { grid-template-columns:1fr; }
    }
  
    /* history registration blocks */
    #historyBody{ margin-top:10px; }
    .histList{ display:flex; flex-direction:column; gap:14px; }
    .histEntry{
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      border-radius:18px;
      padding:12px;
    }
    .histHeader{
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap:10px;
      white-space:nowrap;
    }
    .histScroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:10px; padding-bottom:2px; }
    .histInner{ min-width:max-content; }
    .histDate{ font-size:16px; font-weight:700; }
    .histDays{ opacity:0.8; font-size:14px; }
    .histCatRow{ display:flex; gap:10px; align-items:flex-start; margin-top:10px; min-width:max-content; }
    .histCatLabel{ min-width:52px; font-size:12px; opacity:0.72; padding-top:2px; white-space:nowrap; }
    .histCatPills{ display:flex; flex-wrap:nowrap; gap:8px; overflow:visible; }
    .histCatPills .pill{ padding:7px 10px; font-size:15px; flex:0 0 auto; white-space:nowrap; }

  
    .histHeadLeft{ display:flex; align-items:baseline; gap:10px; min-width:0; }

    .histScroll::-webkit-scrollbar{ height:6px; }

    .histDelBtn{ padding:10px 14px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.03); color:var(--text); }
</style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div id="appTitle" class="title">メンテログ</div>
    </div>

    <div class="tabs">
      <button id="tabInput" type="button" class="active">入力</button>
      <button id="tabHistory" type="button">履歴</button>
    </div>

    <section id="viewInput">
      <div class="card">
        <div class="sectionTitle">記録入力</div>
        <div class="grid2">
          <div>
            <label class="muted" for="date">日付</label>
            <input id="date" type="date">
          </div>
          <div>
            <label class="muted" for="nights">泊数</label>
            <input id="nights" type="number" inputmode="numeric" min="0" placeholder="0">
          </div>
        </div>

        <div style="margin-top:12px">
          <div class="sectionTitle">作業内容</div>
          <div id="tasksArea"></div>
        </div>

        <div style="margin-top:12px">
          <label class="muted" for="other">その他メモ</label>
          <textarea id="other" placeholder="自由入力"></textarea>
        </div>

        <div class="row" style="margin-top:12px">
          <button id="save" type="button">保存</button>
          <button id="clear" type="button">クリア</button>
        </div>
      </div>

      <div class="card">
        <div class="sectionTitle">作業追加</div>
        <div class="grid2">
          <div>
            <label class="muted" for="newTask">作業名</label>
            <input id="newTask" type="text" placeholder="作業名">
          </div>
          <div>
            <label class="muted" for="newCat">区分</label>
            <select id="newCat"></select>
          </div>
        </div>
        <div class="grid2" style="margin-top:10px">
          <div>
            <label class="muted" for="newFreq">推奨頻度 日数</label>
            <input id="newFreq" type="number" inputmode="numeric" min="1" placeholder="未設定">
          </div>
          <div class="row" style="align-items:end">
            <div style="flex:1">
              <label class="muted" for="newBg">背景色</label>
              <input id="newBg" type="color" value="#0f0f0f">
            </div>
            <div style="flex:1">
              <label class="muted" for="newText">文字色</label>
              <input id="newText" type="color" value="#f0f0f0">
            </div>
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button id="addTask" type="button">追加</button>
        </div>
      </div>

      <div class="card">
        <div class="sectionTitle">作業内容マスター</div>
        <div id="master"></div>
      </div>

      <div class="card">
        <div class="sectionTitle">推奨作業</div>
        <div id="reco"></div>
      </div>

      <div class="card">
        <div class="sectionTitle">データ</div>
        <div class="row">
          <button id="export" type="button">JSON書き出し</button>
          <label class="tag" style="cursor:pointer">
            <span>JSON読み込み</span>
            <input id="import" type="file" accept="application/json" style="display:none">
          </label>
          <button id="wipe" type="button" class="danger">全データ削除</button>
        </div>
      </div>

      <div class="card">
        <div class="sectionTitle">アプリ名</div>
        <div class="row">
          <input id="appName" type="text" placeholder="アプリ名">
          <button id="saveAppName" type="button">保存</button>
          <button id="resetAppName" type="button">初期化</button>
        </div>
        <div id="status" class="muted" style="margin-top:10px"></div>
      </div>
    </section>

    <section id="viewHistory" style="display:none">
      <div class="card">
        <div class="row" style="justify-content:space-between; align-items:center">
          <div class="sectionTitle" style="margin:0">履歴</div>
          <div class="row">
            <button id="sortDesc" type="button" class="small active">新しい順</button>
            <button id="sortAsc" type="button" class="small">古い順</button>
          </div>
        </div>
        <div id="historyBody"></div>
      </div>
    </section>
  </div>

  <div id="modalOverlay" class="modalOverlay hidden">
    <div class="modalCard">
      <div id="modalTitle" class="modalHead"></div>
      <div id="modalBody"></div>
      <div class="modalActions">
        <button id="modalCancel" type="button">キャンセル</button>
        <button id="modalOk" type="button">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=2026-02-26-v10"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js?v=2026-02-26-v10").catch(() => {});
      });
    }
  </script>
</body>
</html>
